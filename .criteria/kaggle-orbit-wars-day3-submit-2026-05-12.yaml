task_id: kaggle-orbit-wars-day3-submit-2026-05-12
goal: |
  残 43 day で LB ≥ 1700 (優勝圏) を狙う統合 3-paradigm 戦略の Day 3 (= 2026-05-12 09:00 JST reset 後) を実行する。
  目的は (1) Lakhindar IL paradigm の LB 生死判明 (= datapoint isolation) と (2) safety net で既存 LB best 再保証、
  これで次 phase (= PPO θ.4 真 PFSP / Expansion rule ensemble) の data 駆動 calibration を可能にする。

context:
  branch: main
  spec: docs/strategy/2026-05-11-victory-roadmap.md
  related:
    - "~/projects/kaggle/CLAUDE.md §11 優勝本質性 criterion / §1.3 single paradigm では gold 不可"
    - "~/.claude/CLAUDE.md lessons [2026-05-10] orbit-wars host dataset verification skip → 17% loss"
    - "docs/research/2026-05-11-submission-analyses.md (Day 2 batch ratio drift σ=0.13 over-optimistic)"

deliverables:
  - path: docs/strategy/2026-05-11-victory-roadmap.md
    purpose: P1-P6 6 phase 統合 roadmap (各 phase 開始時に別 plan を起票する旨明記)
  - path: tools/day3_submit.sh
    purpose: Day 3 submit 5 件 orchestration (= 既存 file を P1 5 件構成に書換)
  - path: submissions/build_lakhindar_pure/main.py
    purpose: Lakhindar passive IL single submit (= D paradigm の core datapoint)
  - path: submissions/build_lakhindar_topk1/main.py
    purpose: Lakhindar + topk1 wrapper ensemble (= IL+topk1 ablation)
  - path: tools/smoke_day3.sh
    purpose: Day 3 submit 5 件分の local 1-episode smoke (= Kaggle 評価互換性事前確認)
  - path: docs/research/2026-05-12-submission-analyses.md
    purpose: Day 3 LB 反映 30 分以内 append 用 doc (schema 雛形を P1 着手で作成、 値は 5/12 09:30 以降に埋まる)

baseline:
  - metric: lb_best
    value: 979.4
  - metric: paradigms_submitted_to_lb
    value: 2
  - metric: days_remaining_to_deadline
    value: 43
  - metric: submit_count_to_date
    value: 11

out_of_scope:
  - P2 PPO θ.4 真 PFSP trainer の実装と training (= 別 plan, 5/12-5/13 起票予定)
  - P3 Expansion rule mission 実装 (= 別 plan, P2 完了後)
  - P4 3-paradigm meta-agent 実装 (= 別 plan, P3 完了後)
  - P5 LB ≥ 1500 達成 criteria (= P4 完了後 plan)
  - P6 LB ≥ 1700 達成 criteria (= 最終 plan, 残 7 day で起票)
  - bowwowforeach reverse engineer (= kernel 非公開で棄却済)
  - 5/13 以降の submit slot 戦略 (= 各 Day の plan で再定義)

risks:
  - "Day 3 09:00 JST reset に間に合わない (= 5 件 tar.gz 未作成) → AC-2..AC-4 で 5 件 file 存在を Day 2 残時間で事前担保、 AC-5 で smoke 通過確認"
  - "Lakhindar IL が LB 700 以下 (= IL paradigm dead) → 1 slot のみ pure IL、 残 4 slot は safety/既存 best/ppo_v3/IL+topk1 で 4 軸 datapoint。 dead 判明時は P3 で IL paradigm 棄却して RL+rule 2 paradigm 再構成"
  - "ppo_v3_theta3 Kaggle 60s timeout → AC-5 smoke で 60s 上限事前検知、 超過時は slot 3 を rudra+topk1+bowwow に差替"
  - "LB resampling lag で 30 分以内 append 不能 → best effort、 24h 後 resample を必須 datapoint (Day 2 lesson)"
  - "ratio drift σ=0.13 (Day 2 actual) が systematic over-optimistic → expected LB を local 4P win rate × 800-900 に校正済 (Day 2 doc § Trend coef)"

acceptance_criteria:
  - id: AC-1
    description: P1-P6 統合 roadmap doc が存在し、 各 phase の goal / 期間 / 次 plan trigger 条件を含む
    type: output_exists
    severity: required
    path: docs/strategy/2026-05-11-victory-roadmap.md

  - id: AC-2
    description: Lakhindar pure IL submit package main.py が存在
    type: output_exists
    severity: required
    path: submissions/build_lakhindar_pure/main.py

  - id: AC-3
    description: Lakhindar + topk1 ensemble submit package main.py が存在
    type: output_exists
    severity: required
    path: submissions/build_lakhindar_topk1/main.py

  - id: AC-4
    description: tools/day3_submit.sh が P1 5 件構成に書き換えられている (= submission_v2 / konbu17_topk1 / ppo_v3_theta3 / lakhindar_pure / lakhindar_topk1 全部 grep でヒット)
    type: test_pass
    severity: required
    command: "bash -c 'grep -q submission_v2.tar.gz tools/day3_submit.sh && grep -q konbu17_topk1.tar.gz tools/day3_submit.sh && grep -q ppo_v3_theta3 tools/day3_submit.sh && grep -q build_lakhindar_pure tools/day3_submit.sh && grep -q build_lakhindar_topk1 tools/day3_submit.sh'"
    expected_exit_code: 0
    timeout_seconds: 10

  - id: AC-5
    description: Day 3 submit 5 件全部が local smoke で 1 episode 完走 (= Kaggle 評価互換性、 exception なし、 per-step time p95 ≤ 50ms)
    type: test_pass
    severity: required
    command: "bash tools/smoke_day3.sh"
    expected_exit_code: 0
    timeout_seconds: 600

  - id: AC-6
    description: Day 3 submit window (= 5/12 09:00 JST 以降) で 5 件 submit + 30 分以内に LB initial を submission-analyses.md に append
    type: manual_review
    severity: required
    rubric: |
      reviewer agent が docs/research/2026-05-12-submission-analyses.md と `kaggle competitions submissions orbit-wars` 出力を読み、 以下を確認:
      - 5 件 submit ID が表化されている (= 2026-05-11-submission-analyses.md の Day 2 batch 形式)
      - 各 submit の File / Initial LB / Expected LB / Diff vs Expected の 4 列が埋まっている
      - 各 submit の status が COMPLETE で kaggle CLI 出力で確認可能
      - ratio (= initial LB / expected) が 5 件分計算されている
      - 各 source の効果単独評価 (= per-submit effect isolation 表) が記述されている
      - 出典 (= submission ID, kaggle CLI 出力時刻 JST) 引用されている

  - id: AC-7
    description: P2 (= PPO θ.4 真 PFSP) の plan task が起票されている (= 次 phase 着手前、 Day 3 submit 実行と同時並行可)
    type: output_exists
    severity: required
    path: .criteria/kaggle-orbit-wars-ppo-theta4-pfsp.yaml

  - id: AC-8
    description: Day 3 reset (= 5/12 09:00 JST) 前に PPO θ.4 真 PFSP trainer 実装着手 (= self-history pool sampler + PFSP weight が tools/ 配下に存在)
    type: manual_review
    severity: recommended
    rubric: |
      reviewer agent が以下のいずれかを確認:
      - tools/train_ppo.py に opponents pool の dynamic sampler 関数があり、 PFSP weight w ∝ (1-win_rate)^2 が実装されている
      - OR tools/train_ppo_pfsp.py が新設され、 self-history pool 8 個 + PFSP weight 実装 + 既存 train_ppo.py ロジック再利用ある
      - opponents pool に学習中の checkpoint を動的追加する logic ある (= θ.3 のような static file list ではない)
      - smoke として 1k step training が実行可能 (= crash しない、 log に reward 計算が記録される)
